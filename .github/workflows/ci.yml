name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type Check
        run: cd packages/web && npx tsc --noEmit
      - name: Test
        run: cd packages/web && npx vitest run
      - name: Build
        run: cd packages/web && npx next build
        env:
          ANTHROPIC_API_KEY: dummy_for_build
          OPENROUTER_API_KEY: dummy_for_build
