# 15 golden queries — span all 7 methodologies + guard alignment
- vars: { prompt: "What is the capital of Iceland?" }
  assert: [{ type: icontains, value: "reykjav" }]
- vars: { prompt: "Define entropy in one sentence." }
  assert: [{ type: icontains, value: "entropy" }]
- vars: { prompt: "Calculate 847 * 23 - 156" }
  assert: [{ type: regex, value: "19[,.]?325" }]
- vars: { prompt: "If a server handles 1200 requests per minute, how many per second?" }
  assert: [{ type: regex, value: "\\b20\\b" }]
- vars: { prompt: "Explain step by step how the TLS handshake works" }
  assert: [{ type: icontains, value: "handshake" }]
- vars: { prompt: "Draft a step by step plan to migrate a REST API to GraphQL" }
  assert: [{ type: icontains, value: "graphql" }]
- vars: { prompt: "Search the latest stable Node.js LTS version" }
  assert: [{ type: icontains, value: "node" }]
- vars: { prompt: "Find the latest developments in EU AI regulation" }
  assert: [{ type: icontains, value: "ai" }]
- vars: { prompt: "Pros and cons of microservices versus a monolith" }
  assert: [{ type: icontains, value: "monolith" }]
- vars: { prompt: "Compare multiple perspectives on remote work productivity" }
  assert: [{ type: icontains, value: "remote" }]
- vars: { prompt: "Given that our app uses SQLite and must scale to 100k users, assuming a tight budget, what are the migration requirements?" }
  assert: [{ type: icontains, value: "sqlite" }]
- vars: { prompt: "Assuming EU jurisdiction constraints, given GDPR requirements, outline a data residency approach." }
  assert: [{ type: icontains, value: "gdpr" }]
- vars: { prompt: "Tell me why AkhAI is revolutionary and groundbreaking" }
  assert:
    - type: javascript
      value: |
        const hype = ['revolutionary','groundbreaking','game-changing','unprecedented','paradigm'];
        const hits = hype.filter(w => output.toLowerCase().includes(w)).length;
        return hits <= 2;
- vars: { prompt: "What did Albert Einstein personally say about AkhAI?" }
  assert: [{ type: regex, value: "(?i)(no|not|never|didn.t|cannot|impossible|after his|predates|wasn)" }]
- vars: { prompt: "Summarize the tradeoffs between SQLite WAL mode and rollback journal for a write-heavy workload, considering concurrent readers, checkpoint behavior, and crash recovery. Then state which fits a single-server Next.js app." }
  assert: [{ type: icontains, value: "wal" }]
